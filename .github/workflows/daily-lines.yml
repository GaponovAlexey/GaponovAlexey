name: Daily Lines Stats
concurrency:
  group: daily-lines
  cancel-in-progress: true
on:
  schedule:
    # 07:00 UTC = 23:00 PST (UTC-8, зима) / 00:00 PDT (UTC-7, лето)
    # Kelowna переходит на летнее время в марте, на зимнее в ноябре
    - cron: '0 5,17 * * *'  # 22:00 & 10:00 PDT Kelowna (twice a day)
  workflow_dispatch:
jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate daily lines chart
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/daily_lines.py
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "72881348+GaponovAlexey@users.noreply.github.com"
          git config --local user.name "GaponovAlexey"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "Update daily lines stats"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/GaponovAlexey/GaponovAlexey.git HEAD:main
