name: Daily Lines Stats

concurrency:
  group: daily-lines
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate daily lines chart
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/daily_lines.py

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --local user.email "72881348+GaponovAlexey@users.noreply.github.com"
          git config --local user.name "GaponovAlexey"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "Update daily lines stats"
          git push https://x-access-token:${GH_TOKEN}@github.com/GaponovAlexey/GaponovAlexey.git HEAD:main
