name: Daily Lines Stats

on:
  schedule:
    - cron: '0 0 * * *' # Runs once daily at midnight UTC
  workflow_dispatch: # Manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for proper rebase

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate daily lines chart
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/daily_lines.py

      - name: Commit and push
        run: |
          git config --local user.email "72881348+GaponovAlexey@users.noreply.github.com"
          git config --local user.name "GaponovAlexey"
          git pull --rebase origin main
          git add -A
          git commit -m "Update daily lines stats" || exit 0
          git push origin main

