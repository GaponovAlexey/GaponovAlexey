name: Backfill Stats

concurrency:
  group: backfill-stats
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run backfill
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/backfill.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "72881348+GaponovAlexey@users.noreply.github.com"
          git config --local user.name "GaponovAlexey"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "Backfill stats"

          for i in 1 2 3 4 5; do
            git pull --rebase origin main && \
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/GaponovAlexey/GaponovAlexey.git HEAD:main && \
            break || sleep 5
          done
